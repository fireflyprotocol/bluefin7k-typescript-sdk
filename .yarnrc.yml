nodeLinker: node-modules

# Supply chain hardening: refuse to install package versions younger than 7
# days. Mitigates fast-moving compromised-publish attacks (s1ngularity-,
# shai-hulud-style npm worms) where malicious versions are typically yanked
# within hours. Requires Yarn 4.10+.
npmMinimalAgeGate: "7d"

# Patch upstream packages that forgot to declare a runtime peer. npm 7+ auto-
# installed these silently; yarn 4 is stricter. Hermes-client pulls in
# @zodios/core, which peer-depends on axios but never lists it.
packageExtensions:
  "@pythnetwork/hermes-client@*":
    dependencies:
      axios: "^1.0.0"
